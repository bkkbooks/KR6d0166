  - {type: variant, offset: 6528, length: 183, content: 第五約通教明位釋淨無垢稱義者。大士位在補處真諦之理性自晈然。名之為淨。界內二障正惑已盡習氣微薄。故名無垢。智慧內與真諦相應。外能稱三乘根性神通說法。故云稱也。是則略辨通教大士受淨無垢稱之名。所以須示現此菩薩之像者。用此形聲。託疾為國王長者。說如夢幻之法。勸求菩提。又破三藏教三乘對守拙度之迷僻也。若尋什師生肇注維摩。同用此意。陳梁諸法師講此經文。判菩薩位歷意高下雖少少不同。今家往望皆併是用通教意釋此經耳, 甲: ''}
