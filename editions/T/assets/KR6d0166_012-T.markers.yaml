  - {type: variant, offset: 1823, length: 219, content: 第五約圓教位釋淨無垢稱義者。維摩大士。若是位在法身補處。即是等覺金剛無垢之位。智慧將圓。如十四日月。無明將盡。如二十九日月。故智度論云。普賢文殊。亦有十力四無所畏。如十四日月。佛亦具足十力四無所畏。如十五日月也。法性理顯。故名為淨。無明惑垢將盡。故稱無垢。等覺智慧稱理圓明。稱機而照。故言淨無垢稱也。是則位隣妙覺。若論圓應。乃至十方佛土現十法界身八相成道。此土應宜現補處之形。故居無動佛所。為補處菩薩。來遊忍界。呵諸菩薩。皆稱不任問疾者。正以圓破偏也。又說入不二法門而獨默然者。表圓教內證法門。不可說示也, 甲: ''}
